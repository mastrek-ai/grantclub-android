name: Build APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-tv:
    name: Android TV — APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/mastrek-release.keystore

      - name: Build TV release APK
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=mastrek-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Build TV release AAB
        run: |
          ./gradlew :app:bundleRelease \
            -Pandroid.injected.signing.store.file=mastrek-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: grantclub-tv-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload TV AAB
        uses: actions/upload-artifact@v4
        with:
          name: grantclub-tv-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

  build-mobile:
    name: Android Mobile — APK + AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app-mobile/mastrek-release.keystore

      - name: Build Mobile release APK
        run: |
          ./gradlew :app-mobile:assembleRelease \
            -Pandroid.injected.signing.store.file=mastrek-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Build Mobile release AAB
        run: |
          ./gradlew :app-mobile:bundleRelease \
            -Pandroid.injected.signing.store.file=mastrek-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: grantclub-mobile-release
          path: app-mobile/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Mobile AAB
        uses: actions/upload-artifact@v4
        with:
          name: grantclub-mobile-aab
          path: app-mobile/build/outputs/bundle/release/*.aab
          retention-days: 30
